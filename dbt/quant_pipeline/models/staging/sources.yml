version: 2

sources:
  - name: quant_pipeline_raw
    database: gcp-de-learning-498109
    schema: quant_pipeline_raw
    description: "Raw OHLCV market data loaded from GCS NDJSON via Twelve Data API"
    tables:
      - name: ohlcv_raw
        description: "Daily OHLCV bars per ticker, partitioned by trading_date, clustered on symbol+sector. Append-only; may contain duplicate rows for a given (symbol, trading_date)."
        columns:
          - name: symbol
            description: "Ticker symbol, e.g. AAPL"
          - name: trading_date
            description: "Trading date for the bar"
          - name: open
            description: "Opening price"
          - name: high
            description: "Intraday high price"
          - name: low
            description: "Intraday low price"
          - name: close
            description: "Closing price"
          - name: volume
            description: "Shares traded"
          - name: sector
            description: "Sector classification, denormalized from config/tickers.yaml"
      - name: int_ema_rsi_python
        description: "EMA-20, EMA-50, and RSI-14 computed via pandas (WITH RECURSIVE hit BigQuery's 500-iteration cap). Written by transform/compute_ema_rsi.py with WRITE_TRUNCATE, one row per symbol + trading_date."
        columns:
          - name: symbol
            description: "Ticker symbol"
          - name: trading_date
            description: "Trading date"
          - name: ema_20
            description: "20-day exponential moving average of close price"
          - name: ema_50
            description: "50-day exponential moving average of close price"
          - name: rsi_14
            description: "14-day relative strength index (Wilder smoothing)"
