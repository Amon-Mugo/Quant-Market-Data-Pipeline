version: "3.8"

# Quant pipeline orchestration — self-hosted Airflow (LocalExecutor)
#
# Pop!_OS networking note: bridge networking is broken on this host
# (br_netfilter not loaded, iptables-legacy/nft mismatch, docker0 NO-CARRIER).
# network_mode: host is the established workaround for ALL services below.
# Because of host networking there is no "ports:" mapping — each service
# binds directly to the host port set in its own config/command.
#
# Postgres runs on 5433 (not 5432) because the host already has a system
# Postgres service listening on 5432.
#
# Auth: GCP key creation is blocked by org policy
# (constraints/iam.disableServiceAccountKeyCreation), so this uses
# Application Default Credentials (ADC) from `gcloud auth application-default
# login`, copied into airflow/secrets/adc.json. Runs as the developer's user
# identity, not the scoped quant-pipeline-airflow service account. Production
# deployment would use Workload Identity Federation instead.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
    network: host
  image: quant-pipeline-airflow:latest
  network_mode: host
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@127.0.0.1:5433/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: utc
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: "60"
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/adc.json
    GCP_PROJECT_ID: gcp-de-learning-498109
    GOOGLE_CLOUD_PROJECT: gcp-de-learning-498109
    GCS_BUCKET: quant-pipeline-raw
    BQ_DATASET: quant_pipeline_raw
    BQ_TABLE: ohlcv_raw
    PYTHONPATH: /opt/airflow/repo
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/secrets:/opt/airflow/secrets:ro
    - /etc/passwd:/etc/passwd:ro
    - .:/opt/airflow/repo:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    network_mode: host
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      PGPORT: "5433"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow", "-p", "5433"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Amon \
          --lastname Mugo \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common # https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#airflow-webserver
    command: webserver
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on: 
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: